name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Unit tests
        run: python -m pytest tests/ -q

      # Boot check: the app must import and Settings must load. This catches
      # import-time / config-load failures that unit tests (mocked, temp DBs)
      # miss — e.g. a stray env var crashing Settings at startup.
      - name: Boot check
        run: python -c "from victoria.main import app; from victoria.config import Settings; Settings(); print('boot OK')"
