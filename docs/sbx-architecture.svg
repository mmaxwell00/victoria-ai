<svg viewBox="0 0 700 892" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Victoria in a Docker Sandbox — what lives inside the microVM vs on the host vs in the cloud</title>
<desc>Three zones — cloud/external at top, the isolated Victoria sandbox microVM in the middle, and the macOS host at the bottom — with the sandbox boundary crossings labeled: the published HUD port, the host Model Runner gateway, approved-only mounts, proxy-injected credentials, and org-governed egress.</desc>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== CLOUD ZONE ===== -->
<rect x="20" y="24" width="660" height="180" rx="20" fill="#6E2A1A"/>
<text x="44" y="56" fill="#F0997B" font-size="17" font-weight="600">Cloud / external — reached only via the sandbox's egress</text>
<g>
  <rect x="40" y="66" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="87" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Anthropic API</text><text x="112.5" y="104" fill="#B2B0A6" font-size="11.5" text-anchor="middle">escalation · opt</text>
  <rect x="197" y="66" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="87" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">DuckDuckGo</text><text x="269.5" y="104" fill="#B2B0A6" font-size="11.5" text-anchor="middle">web search</text>
  <rect x="354" y="66" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="87" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">wttr.in</text><text x="426.5" y="104" fill="#B2B0A6" font-size="11.5" text-anchor="middle">weather</text>
  <rect x="511" y="66" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="87" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Dashboard feeds</text><text x="583.5" y="104" fill="#B2B0A6" font-size="11.5" text-anchor="middle">Yahoo · NBC · Fox</text>
  <rect x="40" y="126" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="147" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">GitHub</text><text x="112.5" y="164" fill="#B2B0A6" font-size="11.5" text-anchor="middle">skill import</text>
  <rect x="197" y="126" width="459" height="46" rx="10" fill="#40332F" stroke="#57574F" stroke-width="1"/><text x="426.5" y="147" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Egress posture — org NetworkAll = allow ** (broad)</text><text x="426.5" y="164" fill="#B2B0A6" font-size="11.5" text-anchor="middle">kit allowlist present but dormant · org policy overrides kit rules</text>
</g>

<!-- ===== SANDBOX (microVM) ZONE ===== -->
<rect x="20" y="296" width="660" height="290" rx="20" fill="#0F5E48"/>
<text x="44" y="328" fill="#5DCAA5" font-size="16" font-weight="600">Sandbox microVM — Linux, hardware-isolated (shell-docker image)</text>
<g>
  <rect x="40" y="340" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="361" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">FastAPI · HUD</text><text x="112.5" y="378" fill="#B2B0A6" font-size="11.5" text-anchor="middle">uvicorn :8000</text>
  <rect x="197" y="340" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="361" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Conversation Mgr</text><text x="269.5" y="378" fill="#B2B0A6" font-size="11.5" text-anchor="middle">hub · memory inject</text>
  <rect x="354" y="340" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="361" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">LLM Router</text><text x="426.5" y="378" fill="#B2B0A6" font-size="11.5" text-anchor="middle">local ↔ Claude</text>
  <rect x="511" y="340" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="361" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Tools</text><text x="583.5" y="378" fill="#B2B0A6" font-size="11.5" text-anchor="middle">search · wx · calc</text>
  <rect x="40" y="400" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="421" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Memory</text><text x="112.5" y="438" fill="#B2B0A6" font-size="11.5" text-anchor="middle">SQLite · sessions</text>
  <rect x="197" y="400" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="421" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Semantic memory</text><text x="269.5" y="438" fill="#B2B0A6" font-size="11.5" text-anchor="middle">ChromaDB · ACTIVE</text>
  <rect x="354" y="400" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="421" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Knowledge base</text><text x="426.5" y="438" fill="#B2B0A6" font-size="11.5" text-anchor="middle">mounted vault</text>
  <rect x="511" y="400" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="421" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Vault</text><text x="583.5" y="438" fill="#B2B0A6" font-size="11.5" text-anchor="middle">Fernet · env fallback</text>
  <rect x="40" y="460" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="481" fill="#ECEBE7" font-size="13.5" font-weight="600" text-anchor="middle">Python 3.11 venv</text><text x="112.5" y="498" fill="#B2B0A6" font-size="11.5" text-anchor="middle">uv · full deps</text>
  <rect x="197" y="460" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="481" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">MCP client</text><text x="269.5" y="498" fill="#B2B0A6" font-size="11.5" text-anchor="middle">stdio + SSE</text>
  <rect x="354" y="460" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="481" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Voice</text><text x="426.5" y="498" fill="#B2B0A6" font-size="11.5" text-anchor="middle">browser STT/TTS</text>
  <rect x="511" y="460" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="481" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Injected cred</text><text x="583.5" y="498" fill="#B2B0A6" font-size="11.5" text-anchor="middle">GH_TOKEN (env)</text>
  <rect x="40" y="520" width="616" height="44" rx="10" fill="#124F3D" stroke="#2E7D63" stroke-width="1"/><text x="348" y="540" fill="#CDEFE1" font-size="13.5" font-weight="600" text-anchor="middle">Isolated from the host filesystem &amp; processes</text><text x="348" y="557" fill="#8FCBB4" font-size="11.5" text-anchor="middle">headless microVM: native mic / wake-word N/A — browser voice only</text>
</g>

<!-- ===== HOST ZONE ===== -->
<rect x="20" y="678" width="660" height="170" rx="20" fill="#123E72"/>
<text x="44" y="710" fill="#85B7EB" font-size="17" font-weight="600">Host — macOS (outside the sandbox)</text>
<g>
  <rect x="40" y="720" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="741" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Browser</text><text x="112.5" y="758" fill="#B2B0A6" font-size="11.5" text-anchor="middle">the HUD tab</text>
  <rect x="197" y="720" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="741" fill="#ECEBE7" font-size="13.5" font-weight="600" text-anchor="middle">Docker Model Runner</text><text x="269.5" y="758" fill="#B2B0A6" font-size="11.5" text-anchor="middle">:12434 · local LLM</text>
  <rect x="354" y="720" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="741" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">sbx daemon + proxy</text><text x="426.5" y="758" fill="#B2B0A6" font-size="11.5" text-anchor="middle">credential injection</text>
  <rect x="511" y="720" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="741" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">sbx secret engine</text><text x="583.5" y="758" fill="#B2B0A6" font-size="11.5" text-anchor="middle">github · anthropic</text>
  <rect x="40" y="780" width="302" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="191" y="800" fill="#ECEBE7" font-size="13.5" font-weight="600" text-anchor="middle">Mounted in — approved roots only</text><text x="191" y="817" fill="#B2B0A6" font-size="11" text-anchor="middle">~/sandboxes/** (code) · ~/Obsidian/** (vault)</text>
  <rect x="354" y="780" width="302" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="505" y="800" fill="#ECEBE7" font-size="13.5" font-weight="600" text-anchor="middle">Org governance — mmaxwelldemoorg</text><text x="505" y="817" fill="#B2B0A6" font-size="11" text-anchor="middle">remote-synced · overrides kit-defined rules</text>
</g>

<!-- ===== EDGES ===== -->
<!-- sandbox -> cloud egress -->
<line x1="300" y1="296" x2="300" y2="204" stroke="#8E8E88" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
<text x="318" y="244" fill="#8E8E88" font-size="13">egress · org-governed</text>
<text x="318" y="261" fill="#8E8E88" font-size="13">(broad allow today)</text>

<!-- browser <-> sandbox (published HUD port) -->
<line x1="112" y1="720" x2="112" y2="586" stroke="#8E8E88" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
<text x="118" y="626" fill="#8E8E88" font-size="12.5">HTTP · published</text>
<text x="118" y="642" fill="#8E8E88" font-size="12.5">127.0.0.1:8001→:8000</text>

<!-- mounts (approved roots) -> sandbox, threading the gap at x=191 -->
<line x1="191" y1="780" x2="191" y2="586" stroke="#8E8E88" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
<text x="197" y="678" fill="#8E8E88" font-size="12.5">approved mounts</text>

<!-- model runner <-> sandbox (host gateway) -->
<line x1="269" y1="720" x2="269" y2="586" stroke="#8E8E88" stroke-width="1.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
<text x="277" y="626" fill="#8E8E88" font-size="12.5">host.docker.internal</text>
<text x="277" y="642" fill="#8E8E88" font-size="12.5">:12434 · local LLM</text>

<!-- proxy -> sandbox (credential injection, dashed) -->
<line x1="426" y1="720" x2="426" y2="586" stroke="#8E8E88" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ah)"/>
<text x="434" y="634" fill="#8E8E88" font-size="12.5">creds injected → GH_TOKEN</text>

<!-- ===== LEGEND ===== -->
<rect x="44" y="860" width="14" height="14" rx="3" fill="#6E2A1A"/><text x="64" y="871" fill="#6E6E68" font-size="12">cloud (off your Mac)</text>
<rect x="232" y="860" width="14" height="14" rx="3" fill="#0F5E48"/><text x="252" y="871" fill="#6E6E68" font-size="12">sandbox microVM</text>
<rect x="392" y="860" width="14" height="14" rx="3" fill="#123E72"/><text x="412" y="871" fill="#6E6E68" font-size="12">host (your Mac)</text>
<text x="548" y="871" fill="#6E6E68" font-size="12">– – – = injected</text>
</svg>
