<svg viewBox="0 0 700 912" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Victoria deployment topology — inside vs outside the container</title>
<desc>Three zones — cloud/external at top, the Victoria container in the middle, and the macOS host at the bottom — with every boundary-crossing connection labeled by protocol and port.</desc>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== CLOUD ZONE ===== -->
<rect x="20" y="24" width="660" height="180" rx="20" fill="#6E2A1A"/>
<text x="44" y="56" fill="#F0997B" font-size="17" font-weight="600">Cloud / external — leaves your Mac (mostly opt-in)</text>
<g>
  <rect x="40" y="66" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="87" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Anthropic API</text><text x="112.5" y="104" fill="#B2B0A6" font-size="11.5" text-anchor="middle">escalation + API</text>
  <rect x="197" y="66" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="87" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">ElevenLabs</text><text x="269.5" y="104" fill="#B2B0A6" font-size="11.5" text-anchor="middle">cloud TTS · opt</text>
  <rect x="354" y="66" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="87" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">DuckDuckGo</text><text x="426.5" y="104" fill="#B2B0A6" font-size="11.5" text-anchor="middle">web search</text>
  <rect x="511" y="66" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="87" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">wttr.in</text><text x="583.5" y="104" fill="#B2B0A6" font-size="11.5" text-anchor="middle">weather</text>
  <rect x="40" y="126" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="147" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">GitHub</text><text x="112.5" y="164" fill="#B2B0A6" font-size="11.5" text-anchor="middle">skill import</text>
  <rect x="197" y="126" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="147" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Telegram</text><text x="269.5" y="164" fill="#B2B0A6" font-size="11.5" text-anchor="middle">bot · opt</text>
  <rect x="354" y="126" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="147" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Remote MCP</text><text x="426.5" y="164" fill="#B2B0A6" font-size="11.5" text-anchor="middle">SSE · opt</text>
  <rect x="511" y="126" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="147" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Dashboard feeds</text><text x="583.5" y="164" fill="#B2B0A6" font-size="11.5" text-anchor="middle">Yahoo · CNN · Fox</text>
</g>

<!-- ===== CONTAINER ZONE ===== -->
<rect x="20" y="296" width="660" height="306" rx="20" fill="#0F5E48"/>
<text x="44" y="328" fill="#5DCAA5" font-size="17" font-weight="600">Container — victoria image · services: api (:8000) + telegram</text>
<g>
  <rect x="40" y="340" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="361" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Conversation Mgr</text><text x="112.5" y="378" fill="#B2B0A6" font-size="11.5" text-anchor="middle">hub · memory inject</text>
