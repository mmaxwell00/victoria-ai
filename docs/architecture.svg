  <rect x="511" y="340" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="361" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Claude Code CLI</text><text x="583.5" y="378" fill="#B2B0A6" font-size="11.5" text-anchor="middle">bundled</text>
  <rect x="40" y="400" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="421" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Memory</text><text x="112.5" y="438" fill="#B2B0A6" font-size="11.5" text-anchor="middle">SQLite · ChromaDB</text>
  <rect x="197" y="400" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="421" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Skills</text><text x="269.5" y="438" fill="#B2B0A6" font-size="11.5" text-anchor="middle">instructions</text>
  <rect x="354" y="400" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="421" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Vault</text><text x="426.5" y="438" fill="#B2B0A6" font-size="11.5" text-anchor="middle">Fernet · masked</text>
  <rect x="511" y="400" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="421" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">MCP client</text><text x="583.5" y="438" fill="#B2B0A6" font-size="11.5" text-anchor="middle">stdio + SSE</text>
  <rect x="40" y="460" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="481" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Tools</text><text x="112.5" y="498" fill="#B2B0A6" font-size="11.5" text-anchor="middle">search·wx·calc</text>
  <rect x="197" y="460" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="481" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">MCP stdio</text><text x="269.5" y="498" fill="#B2B0A6" font-size="11.5" text-anchor="middle">npx · in-container</text>
  <rect x="354" y="460" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="481" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Web HUD</text><text x="426.5" y="498" fill="#B2B0A6" font-size="11.5" text-anchor="middle">static assets</text>
  <rect x="511" y="460" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="481" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">FastAPI</text><text x="583.5" y="498" fill="#B2B0A6" font-size="11.5" text-anchor="middle">uvicorn :8000</text>
  <rect x="40" y="520" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="541" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Knowledge base</text><text x="112.5" y="558" fill="#B2B0A6" font-size="11.5" text-anchor="middle">Obsidian vaults</text>
</g>

<!-- ===== HOST ZONE ===== -->
<rect x="20" y="694" width="660" height="184" rx="20" fill="#123E72"/>
<text x="44" y="726" fill="#85B7EB" font-size="17" font-weight="600">Host — macOS (outside the container)</text>
<g>
  <rect x="40" y="736" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="112.5" y="757" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Browser</text><text x="112.5" y="774" fill="#B2B0A6" font-size="11.5" text-anchor="middle">the HUD tab</text>
  <rect x="197" y="736" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="269.5" y="757" fill="#ECEBE7" font-size="13.5" font-weight="600" text-anchor="middle">Docker Model Runner</text><text x="269.5" y="774" fill="#B2B0A6" font-size="11.5" text-anchor="middle">:12434 · local LLM</text>
  <rect x="354" y="736" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="426.5" y="757" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Ollama</text><text x="426.5" y="774" fill="#B2B0A6" font-size="11.5" text-anchor="middle">:11434 · opt</text>
  <rect x="511" y="736" width="145" height="46" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="583.5" y="757" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">macOS Keychain</text><text x="583.5" y="774" fill="#B2B0A6" font-size="11.5" text-anchor="middle">vault master key</text>
  <rect x="40" y="798" width="616" height="44" rx="10" fill="#3A3A37" stroke="#57574F" stroke-width="1"/><text x="348" y="818" fill="#ECEBE7" font-size="14" font-weight="600" text-anchor="middle">Bind-mounted volumes (persist on host, survive rebuilds)</text><text x="348" y="835" fill="#B2B0A6" font-size="11.5" text-anchor="middle">./data (SQLite · ChromaDB · vault.enc) · ./models (Piper) · ./skills · Obsidian vault(s)</text>
</g>

