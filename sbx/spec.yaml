# Victoria — Docker Sandboxes kit (verified working end-to-end).
#
# WHY A PACKED KIT: sbx (v0.35) kits are packed artifacts (spec.yaml + optional
# files/), NOT a raw YAML.
#
# DEPLOY WITH ./deploy-sandbox.sh — it is the supported entry point. sbx mounts a
# host path at that SAME absolute path inside the sandbox (no remapping), so the
# repo/vault paths below are host-username-specific. To keep this kit portable,
# they are written as placeholders that the deploy script substitutes at pack time:
#   __VICTORIA_REPO__   -> the staged repo   (default: $HOME/sandboxes/victoria-ai)
#   __VICTORIA_VAULT__  -> the Obsidian vault (default: $HOME/Obsidian/AI/AI-Victoria)
# Do NOT `sbx kit pack sbx/` directly — you'd ship the literal placeholders. Run
# ./deploy-sandbox.sh (or replicate its substitute→pack→run→publish steps).
#
# What the deploy script does, in effect:
#   1. Stage code under an allowed mount root:  git clone <repo> $HOME/sandboxes/victoria-ai
#   2. Substitute the placeholders into a spec copy, then pack + run (agent name = kit name):
#        sbx kit pack <build> -o /tmp/victoria-kit.zip
#        sbx run --kit /tmp/victoria-kit.zip --name victoria -d victoria <repo> <vault>
#   3. Publish the HUD (IPv4 — the service is IPv4-only):
#        sbx ports victoria --publish 127.0.0.1:8001:8000
#        open http://127.0.0.1:8001        # use 127.0.0.1, NOT localhost (resolves to ::1)
#
# The vault mount needs a filesystem-allow rule for its path where sandboxes are
# org-governed (e.g. ~/Obsidian/**, case-sensitive).

schemaVersion: "1"
kind: sandbox
name: victoria
displayName: Victoria AI
description: >-
  Victoria assistant (FastAPI HUD) as a persistent Docker Sandbox service,
  backed by the host's Docker Model Runner. Installs the FULL dependency set on
  a uv-managed Python 3.11 venv (semantic memory + voice) and runs uvicorn as a
  background startup service.

agentContext: |
  Victoria's API + HUD run on port 8000 inside this sandbox. Publish to the host:
    sbx ports <sandbox> --publish 127.0.0.1:8001:8000
  The local LLM is the host's Docker Model Runner at host.docker.internal:12434.

environment:
  variables:
    DEFAULT_LLM: docker
    # Reach the host Model Runner from inside the sandbox (NOT localhost):
    MODEL_RUNNER_URL: http://host.docker.internal:12434/engines/llama.cpp/v1
    MODEL_RUNNER_MODEL: ai/qwen2.5:32k
    # Obsidian vault mount = the knowledge base (memory + RAG). Placeholder
    # substituted by deploy-sandbox.sh (VAULT_PATH); host path == in-sandbox path.
    OBSIDIAN_VAULT_PATH: __VICTORIA_VAULT__
    ESCALATION_ENABLED: "true"

# ── Egress allowlist (Phase 3 hardening target) ──────────────────────────────
# IMPORTANT: this bites ONLY under a default-deny network baseline. Per Docker's
# governance model, an ACTIVE org policy overrides kit-defined rules — and this
# org has a blanket `NetworkAll: allow **` applied to all sandboxes, so the list
# below is currently INERT (nothing is actually restricted), by deliberate choice.
# sbx network governance is org/team-scoped (NOT per-sandbox), so activating this
# means tightening the org-wide `NetworkAll` policy in Docker Home — which affects
# every sandbox, not just Victoria. See SECURITY-AUDIT.md. Kept here as the ready,
# correct target so a future org-wide default-deny activates cleanly.
# `deniedDomains` is unnecessary: the org already enforces its own denies (DPRK, etc.).
network:
  allowedDomains:
    # -- Local LLM: host Model Runner via the sandbox's host gateway --
    - host.docker.internal
    # -- Cloud escalation --
    - api.anthropic.com
    # -- Built-in tools --
    - duckduckgo.com              # web_search (ddgs → html./lite./links.)
    - "*.duckduckgo.com"
    - wttr.in                     # weather tool + dashboard weather box
    # -- Dashboard feeds --
    - query1.finance.yahoo.com    # markets: stocks / metals / indices
    - query2.finance.yahoo.com
    - feeds.nbcnews.com           # headlines: NBC News RSS
    - moxie.foxnews.com           # headlines: Fox News RSS
    # -- Skill import + GitHub tools --
    - github.com
    - api.github.com
    - codeload.github.com
    - raw.githubusercontent.com
    - objects.githubusercontent.com
    # -- Build-time: dependency install (uv-managed py3.11 + pip + model pulls) --
    - pypi.org
    - files.pythonhosted.org
    - huggingface.co
    - "*.huggingface.co"
    - deb.debian.org              # apt: ffmpeg + libportaudio2
    - registry.npmjs.org          # optional MCP (node) servers

commands:
  install:
    # System libs: ffmpeg (Whisper STT) + PortAudio (sounddevice). Root user.
    - command: apt-get update -qq && apt-get install -y -qq ffmpeg libportaudio2
      user: "0"
      description: System libraries for voice (Whisper ffmpeg + PortAudio)
    # The shell-docker image ships Python 3.14 — too new for chromadb / faster-
    # whisper / piper. uv (preinstalled in the image) manages a Python 3.11 venv
    # so the FULL dependency set installs → semantic memory (ChromaDB) + voice.
    - command: uv venv /home/agent/venv --python 3.11
      user: "1000"
      description: Create a uv-managed Python 3.11 virtualenv (as the agent user)
    - command: uv pip install --python /home/agent/venv/bin/python -r __VICTORIA_REPO__/requirements.txt
      user: "1000"
      description: Install the full Victoria dependency set as the agent (ChromaDB + voice + all)
  startup:
    # A long-running service goes in startup/background (NOT entrypoint, which is
    # the interactive agent process and dies on detach). Bind 0.0.0.0; run from
    # the Python 3.11 venv so semantic memory + voice are available.
    #
    # RACE GUARD: startup can fire before `install` has finished. Two distinct
    # traps, both fatal to uvicorn:
    #   1. `uv venv` hasn't run yet → /home/agent/venv/bin/python is a dangling
    #      symlink → "python: not found".
    #   2. The interpreter is runnable (uv venv done) but `uv pip install` is still
    #      running → "No module named uvicorn" (and chromadb/etc. absent).
    # So we gate on the real precondition for `uvicorn victoria.main:app`: the app
    # itself importing (which requires the full dependency set). Bounded to ~6 min.
    - command:
        - sh
        - -c
        - |
          exec > /tmp/victoria.log 2>&1
          VENV=/home/agent/venv/bin/python
          STAGE=__VICTORIA_REPO__
          cd "$STAGE"
          for i in $(seq 1 180); do
            "$VENV" -c 'import uvicorn, victoria.main' >/dev/null 2>&1 && break
            echo "[startup] waiting for dependencies + app to import ($i/180)…"
            sleep 2
          done
          if ! "$VENV" -c 'import uvicorn, victoria.main' >/dev/null 2>&1; then
            echo "[startup] FATAL: app never became importable — last error:"
            "$VENV" -c 'import uvicorn, victoria.main'
            exit 1
          fi
          echo "[startup] dependencies ready; launching uvicorn"
          exec "$VENV" -m uvicorn victoria.main:app --host 0.0.0.0 --port 8000
      background: true
      description: Start the Victoria API server on :8000 (Python 3.11 venv; waits for the full dep install + app import first)

sandbox:
  image: docker/sandbox-templates:shell-docker
  aiFilename: CLAUDE.md
  entrypoint:
    run: [bash]
