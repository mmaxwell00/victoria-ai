# Victoria — Docker Sandboxes kit (verified working end-to-end, Phase 1).
#
# WHY A PACKED KIT: sbx (v0.35) kits are packed artifacts (spec.yaml + optional
# files/), NOT a raw YAML. This directory is packed with `sbx kit pack sbx/`.
#
# RUN IT:
#   # 1. Code must live under an org-allowed mount root (~/sandboxes/**):
#   git clone <this-repo> ~/sandboxes/victoria-ai
#   # 2. Pack + run (agent name must equal the kit name, "victoria"):
#   sbx kit pack sbx/ -o /tmp/victoria-kit.zip
#   sbx run --kit /tmp/victoria-kit.zip --name victoria -d \
#       victoria ~/sandboxes/victoria-ai ~/Obsidian/AI/AI-Victoria
#   # 3. Publish the HUD (IPv4 — the service is IPv4-only):
#   sbx ports victoria --publish 127.0.0.1:8001:8000
#   open http://127.0.0.1:8001          # use 127.0.0.1, NOT localhost (resolves to ::1)
#
# The vault mount needs an org filesystem-allow rule for its path (e.g. ~/Obsidian/**).
# Paths below are the in-sandbox mount paths (= the host paths passed to `sbx run`,
# direct-mounted). Adjust the username/paths for your host.

schemaVersion: "1"
kind: sandbox
name: victoria
displayName: Victoria AI
description: >-
  Victoria assistant (FastAPI HUD) as a persistent Docker Sandbox service,
  backed by the host's Docker Model Runner. Installs the FULL dependency set on
  a uv-managed Python 3.11 venv (semantic memory + voice) and runs uvicorn as a
  background startup service.

agentContext: |
  Victoria's API + HUD run on port 8000 inside this sandbox. Publish to the host:
    sbx ports <sandbox> --publish 127.0.0.1:8001:8000
  The local LLM is the host's Docker Model Runner at host.docker.internal:12434.

environment:
  variables:
    DEFAULT_LLM: docker
    # Reach the host Model Runner from inside the sandbox (NOT localhost):
    MODEL_RUNNER_URL: http://host.docker.internal:12434/engines/llama.cpp/v1
    MODEL_RUNNER_MODEL: ai/qwen2.5:32k
    # Obsidian vault mount = the knowledge base (memory + RAG). Adjust to your path.
    OBSIDIAN_VAULT_PATH: /Users/mark.maxwelldocker.com/Obsidian/AI/AI-Victoria
    ESCALATION_ENABLED: "true"

commands:
  install:
    # System libs: ffmpeg (Whisper STT) + PortAudio (sounddevice). Root user.
    - command: apt-get update -qq && apt-get install -y -qq ffmpeg libportaudio2
      user: "0"
      description: System libraries for voice (Whisper ffmpeg + PortAudio)
    # The shell-docker image ships Python 3.14 — too new for chromadb / faster-
    # whisper / piper. uv (preinstalled in the image) manages a Python 3.11 venv
    # so the FULL dependency set installs → semantic memory (ChromaDB) + voice.
    - command: uv venv /home/agent/venv --python 3.11
      user: "1000"
      description: Create a uv-managed Python 3.11 virtualenv (as the agent user)
    - command: uv pip install --python /home/agent/venv/bin/python -r /Users/mark.maxwelldocker.com/sandboxes/victoria-ai/requirements.txt
      user: "1000"
      description: Install the full Victoria dependency set as the agent (ChromaDB + voice + all)
  startup:
    # A long-running service goes in startup/background (NOT entrypoint, which is
    # the interactive agent process and dies on detach). Bind 0.0.0.0; run from
    # the Python 3.11 venv so semantic memory + voice are available.
    #
    # RACE GUARD: startup can fire before `install` has finished materialising the
    # uv-managed interpreter, so /home/agent/venv/bin/python is a momentarily
    # dangling symlink and uvicorn dies with "python: not found". We block until
    # the interpreter actually runs (bounded to ~5 min) before exec'ing uvicorn.
    - command:
        - sh
        - -c
        - |
          exec > /tmp/victoria.log 2>&1
          VENV=/home/agent/venv/bin/python
          STAGE=/Users/mark.maxwelldocker.com/sandboxes/victoria-ai
          for i in $(seq 1 150); do
            "$VENV" -c 'import sys' >/dev/null 2>&1 && break
            echo "[startup] waiting for venv interpreter to be ready ($i/150)…"
            sleep 2
          done
          "$VENV" -c 'import sys' >/dev/null 2>&1 || { echo "[startup] FATAL: venv interpreter never became runnable"; exit 1; }
          echo "[startup] venv ready; launching uvicorn"
          cd "$STAGE"
          exec "$VENV" -m uvicorn victoria.main:app --host 0.0.0.0 --port 8000
      background: true
      description: Start the Victoria API server on :8000 (Python 3.11 venv; waits for the interpreter first)

sandbox:
  image: docker/sandbox-templates:shell-docker
  aiFilename: CLAUDE.md
  entrypoint:
    run: [bash]
