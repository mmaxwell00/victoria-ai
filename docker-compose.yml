# Docker Model Runner is built into Docker Desktop — no extra container needed.
# Enable it in Docker Desktop → Settings → Features in development → Docker Model Runner
# Then pull a model: docker model pull ai/llama3.2

services:
  victoria-api:
    build: .
    command: uvicorn victoria.main:app --host 0.0.0.0 --port 8000
    ports:
      # Bind to loopback only — the API has no authentication, so exposing it
      # on the LAN would let anyone read conversation history and chat on
      # your API bill. Change to "8000:8000" only if you add auth.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Override URL to reach Model Runner from inside the container
      - MODEL_RUNNER_URL=http://model-runner.docker.internal/engines/llama.cpp/v1
      # Secrets are injected from the macOS Keychain at launch by the `victoria`
      # command / installer — NOT persisted in .env. These pass through from the
      # host shell env (empty if you run compose without exporting them).
      - VICTORIA_VAULT_KEY
      - CLAUDE_CODE_OAUTH_TOKEN
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      # Skills live in the repo dir: created/edited skills persist on the host
      # (survive rebuilds) and can be committed. Shadows the image's baked copy.
      - ./skills:/app/skills
    restart: unless-stopped

  victoria-telegram:
    build: .
    command: python scripts/run_telegram.py
    env_file:
      - .env
    environment:
      - MODEL_RUNNER_URL=http://model-runner.docker.internal/engines/llama.cpp/v1
      - VICTORIA_VAULT_KEY
      - CLAUDE_CODE_OAUTH_TOKEN
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      # Skills live in the repo dir: created/edited skills persist on the host
      # (survive rebuilds) and can be committed. Shadows the image's baked copy.
      - ./skills:/app/skills
    restart: unless-stopped
