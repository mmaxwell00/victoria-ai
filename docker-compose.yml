version: "3.9"

services:
  victoria-api:
    build: .
    command: uvicorn victoria.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    depends_on:
      - ollama

  victoria-telegram:
    build: .
    command: python scripts/run_telegram.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
